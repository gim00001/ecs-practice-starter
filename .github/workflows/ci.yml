name: CI Workflow

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4        # v3 → v4 로 변경

      - name: JDK 17 설정
        uses: actions/setup-java@v4      # v3 → v4 로 변경
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: gradlew 실행 권한 부여     # 이 step 추가 ← 핵심
        run: chmod +x ./gradlew

      - name: 빌드 및 테스트
        run: ./gradlew clean build